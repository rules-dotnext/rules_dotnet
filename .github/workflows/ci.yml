name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build & Test (Linux)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-linux-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-linux-

      - name: Build all targets
        run: bazel build //... --keep_going

      - name: Unit and analysis tests
        run: bazel test //dotnet/private/tests/... --test_output=errors

      - name: Stardoc generation
        run: bazel build //docs:rules_api

  # Full cross-platform matrix on releases and manual dispatch only
  cross-platform:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
            cache-path: ~/Library/Caches/bazel
          - os: windows-latest
            label: windows
            cache-path: ~/.cache/bazel
    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.label }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.cache-path }}
            ~/.cache/bazelisk
          key: bazel-${{ matrix.label }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-${{ matrix.label }}-

      - name: Shorten Bazel output root (Windows MAX_PATH)
        if: matrix.label == 'windows'
        run: echo "startup --output_user_root=C:/_b" >> .bazelrc.user
        shell: bash

      - name: Unit and analysis tests
        run: bazel test //dotnet/private/tests/... --test_output=errors
        shell: bash

  e2e:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        tfm: [smoke, net8.0, net9.0, net10.0, web_sdk]
    runs-on: ${{ matrix.os }}
    name: E2E (${{ matrix.os }} / ${{ matrix.tfm }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-e2e-${{ matrix.tfm }}-${{ matrix.os }}-${{ hashFiles('MODULE.bazel') }}
          restore-keys: bazel-e2e-${{ matrix.tfm }}-${{ matrix.os }}-

      - name: Shorten Bazel output root (Windows MAX_PATH)
        if: contains(matrix.os, 'windows')
        run: echo "startup --output_user_root=C:/_b" >> .bazelrc.user
        shell: bash

      - name: E2E tests (${{ matrix.tfm }})
        run: cd e2e/${{ matrix.tfm }} && bazel test //... --test_output=errors
        shell: bash
