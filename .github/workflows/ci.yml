name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build & Test (Linux)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-linux-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-linux-

      - name: Build all targets
        run: |
          # Exclude stardoc doc_extract/docs-as-proto targets (require proto toolchain)
          EXCLUDE=$(bazel query 'kind("doc_extract rule", //...) + filter("docs-as-proto", //...) + kind("stardoc", //...)' 2>/dev/null | sed 's/^/-/' | tr '\n' ' ')
          bazel build --keep_going -- //... ${EXCLUDE}

      - name: Unit and analysis tests
        run: bazel test //dotnet/private/tests/... --test_output=errors
