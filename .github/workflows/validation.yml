name: Validation Proof Sequence

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Bazel target pattern to build/test'
        required: false
        default: '//dotnet/private/tests/...'

permissions:
  contents: read

env:
  BES_FLAGS: >-
    --bes_results_url=https://app.buildbuddy.io/invocation/
    --bes_backend=grpcs://remote.buildbuddy.io
    --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

jobs:
  proof-sequence:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            cache-path: ~/.cache/bazel
          - os: macos-latest
            label: macos
            cache-path: ~/Library/Caches/bazel
          - os: windows-latest
            label: windows
            cache-path: ~/.cache/bazel
    runs-on: ${{ matrix.os }}
    name: Proof (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.cache-path }}
            ~/.cache/bazelisk
          key: bazel-proof-${{ matrix.label }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock') }}
          restore-keys: bazel-proof-${{ matrix.label }}-

      - name: Shorten Bazel output root (Windows MAX_PATH)
        if: matrix.label == 'windows'
        run: echo "startup --output_user_root=C:/_b" >> .bazelrc.user
        shell: bash

      # Invocation 1: Cold build (no cache)
      - name: "Invocation 1: Cold build"
        run: |
          bazel clean
          bazel test ${{ github.event.inputs.target }} \
            ${{ env.BES_FLAGS }} \
            --noremote_accept_cached \
            --test_output=errors \
            || true
        shell: bash

      # Invocation 2: Warm rebuild (hermeticity proof)
      - name: "Invocation 2: Warm rebuild"
        run: |
          bazel test ${{ github.event.inputs.target }} \
            ${{ env.BES_FLAGS }} \
            --test_output=errors \
            || true
        shell: bash

      # Invocation 3: Incremental (touch one file in diamond dep graph)
      - name: "Invocation 3: Incremental build"
        run: |
          echo "// validation marker $(date)" >> dotnet/private/tests/appsettings/Main.cs
          bazel test ${{ github.event.inputs.target }} \
            ${{ env.BES_FLAGS }} \
            --test_output=errors \
            || true
          git checkout dotnet/private/tests/appsettings/Main.cs
        shell: bash

      # Invocation 4: Remote cache (clean + rebuild from remote cache)
      - name: "Invocation 4: Remote cache rebuild"
        run: |
          bazel clean
          bazel test ${{ github.event.inputs.target }} \
            ${{ env.BES_FLAGS }} \
            --remote_cache=grpcs://remote.buildbuddy.io \
            --test_output=errors \
            || true
        shell: bash
